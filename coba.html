<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <!-- Style sementara di bawah ini berfungsi untuk "menerangi" div yang transparan -->
<style>
    /* Memberikan warna latar abu-abu halus & garis tebal pada seluruh baris */
    .debug-row {
        background-color: #f8f9fa;
        border: 2px dashed #6c757d;
        padding: 10px 0;
    }

    /* Memberikan garis merah & warna pastel pada kolom yang ADA ISINYA (Input) */
    .debug-col-isi {
        border: 2px solid #dc3545;
        background-color: #e2e3e5;
        padding: 5px;
    }

    /* Memberikan garis biru putus-putus & warna kuning transparan pada KOLOM KOSONG */
    .debug-col-kosong {
        border: 2px dashed #0d6efd;
        background-color: #fff3cd;
        min-height: 40px; /* Diberi tinggi minimal agar kolom kosong bisa kelihatan bentuknya */
        padding: 5px;
    }
</style>

<!-- 1. CONTAINER UTAMA: Wadah pembatas kiri-kanan halaman -->
<div class="container">
    
    <!-- 2. ROW UNTUK JUDUL: my-5 memberi jarak atas-bawah -->
    <div class="row my-5">
        <div class="col-12">
            <h1 class="text-center">masih belajar gaes</h1>
        </div>
    </div>  
    
    <!-- 3. ROW UNTUK INPUT (Di-debug pakai class .debug-row): 
         justify-content-center bertugas menarik seluruh kolom di bawah ini ke tengah secara horizontal -->
    <div class="row justify-content-center debug-row">
        
        <!-- KOLOM 1 (Ada Input Angka 1): Memakan lebar 2 dari 12 bagian grid -->
        <div class="col-2 debug-col-isi">
            <small class="d-block text-danger fw-bold">Kolom 1 (Isi)</small>
            <div class="input-group">
                <input type="text" name="" id="aritmatika1" class="form-control" placeholder="Angka 1" aria-label="Angka 1">
            </div>
        </div>

        <!-- KOLOM 2 (Ada Input Angka 2): Memakan lebar 2 dari 12 bagian grid -->
        <div class="col-2 debug-col-isi">
            <small class="d-block text-danger fw-bold">Kolom 2 (Isi)</small>
            <div class="input-group">
                <input type="number" name="" id="aritmatika2" class="form-control" placeholder="Angka 2" aria-label="Angka 2">
            </div>
        </div>

        <!-- KOLOM 3 (Kosong): Memakan jatah 2/12 grid, tapi tidak ada behaves/isi -->
        <div class="col-2 debug-col-kosong">
            <small class="text-primary fw-bold">Kolom 3 (Kosong)</small>
        </div>

        <!-- KOLOM 4 (Kosong): Memakan jatah 2/12 grid -->
        <div class="col-2 debug-col-kosong">
            <small class="text-primary fw-bold">Kolom 4 (Kosong)</small>
        </div>

        <!-- KOLOM 5 (Kosong): Memakan jatah 2/12 grid -->
        <div class="col-2 debug-col-kosong">
            <small class="text-primary fw-bold">Kolom 5 (Kosong)</small>
        </div>

    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
